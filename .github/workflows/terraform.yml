name: Terraform

on:
  push:
    branches: [main]
    paths: [terraform/**]
  pull_request:
    paths: [terraform/**]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_DIR: terraform/cloudflare
  TF_VERSION: "1.12"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_github_pages_verification_code: ${{ secrets.GITHUB_PAGES_VERIFICATION_CODE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ env.TF_DIR }}
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: terraform init -backend-config="endpoints={s3=\"$R2_ENDPOINT\"}"

      - name: Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.substring(0, 60000) + '\n\n... truncated';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan

  apply:
    name: Apply
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_github_pages_verification_code: ${{ secrets.GITHUB_PAGES_VERIFICATION_CODE }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ env.TF_DIR }}
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: terraform init -backend-config="endpoints={s3=\"$R2_ENDPOINT\"}"

      - uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
