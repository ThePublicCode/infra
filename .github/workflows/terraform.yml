name: Terraform

on:
  push:
    branches: [main]
    paths: [terraform/**]
  pull_request:
    paths: [terraform/**]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.12"

jobs:
  detect:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      dirs: ${{ steps.dirs.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed terraform directories
        id: dirs
        uses: actions/github-script@v7
        with:
          script: |
            // On workflow_dispatch or push to main, run all directories
            if (context.eventName === 'workflow_dispatch') {
              return JSON.stringify(['terraform/cloudflare', 'terraform/github']);
            }

            const base = context.eventName === 'pull_request'
              ? context.payload.pull_request.base.sha
              : context.payload.before;

            const { execSync } = require('child_process');
            const diff = execSync(`git diff --name-only ${base} HEAD`).toString();
            const dirs = new Set();
            for (const file of diff.split('\n')) {
              if (file.startsWith('terraform/cloudflare/')) dirs.add('terraform/cloudflare');
              if (file.startsWith('terraform/github/')) dirs.add('terraform/github');
            }
            return JSON.stringify([...dirs]);
          result-encoding: string

  plan:
    name: "Plan (${{ matrix.dir }})"
    needs: detect
    if: needs.detect.outputs.dirs != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect.outputs.dirs) }}
    env:
      # Cloudflare vars
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_github_pages_verification_code: ${{ secrets.GITHUB_PAGES_VERIFICATION_CODE }}
      # GitHub vars
      TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
      # R2 backend
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ matrix.dir }}
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: terraform init -backend-config="endpoints={s3=\"$R2_ENDPOINT\"}"

      - name: Plan
        id: plan
        working-directory: ${{ matrix.dir }}
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee /tmp/plan.txt

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          DIR: ${{ matrix.dir }}
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            if (plan.length > 60000) plan = plan.substring(0, 60000) + '\n\n... truncated';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Terraform Plan — \`${process.env.DIR}\`\n\`\`\`\n${plan}\n\`\`\``
            });

      - name: Fail on plan error
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        with:
          name: tfplan-${{ hashFiles(format('{0}/**', matrix.dir)) }}
          path: ${{ matrix.dir }}/tfplan

  apply:
    name: "Apply (${{ matrix.dir }})"
    needs: [detect, plan]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        dir: ${{ fromJson(needs.detect.outputs.dirs) }}
    env:
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_id: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      TF_VAR_github_pages_verification_code: ${{ secrets.GITHUB_PAGES_VERIFICATION_CODE }}
      TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Init
        working-directory: ${{ matrix.dir }}
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: terraform init -backend-config="endpoints={s3=\"$R2_ENDPOINT\"}"

      - uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ hashFiles(format('{0}/**', matrix.dir)) }}
          path: ${{ matrix.dir }}

      - name: Apply
        working-directory: ${{ matrix.dir }}
        run: terraform apply -auto-approve tfplan
